<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../image/logo2.png">
    <link rel="apple-touch-icon" href="../image/logo2.png">
    <title>Chat - Synapse Veda</title>
    <link rel="stylesheet" href="../style/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tomorrow-night-blue.min.css">
    <style>
        /* Tambahan style biar rapi buat preview gambar */
        .image-preview-container {
            display: none;
            padding: 10px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            position: relative;
        }
        .preview-wrapper {
            position: relative;
            display: inline-block;
        }
        #image-preview {
            max-width: 80px;
            max-height: 80px;
            border-radius: 8px;
            border: 2px solid var(--accent-color);
        }
        #remove-preview {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #ff4d4d;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 12px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .upload-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0 10px;
            transition: color 0.3s;
        }
        .upload-btn:hover {
            color: var(--accent-color);
        }
        #file-input {
            display: none;
        }
    </style>
</head>
<body>
    <div id="app-wrapper">
        <aside id="sidebar">
            <div class="sidebar-header">
                <button id="new-chat-btn" class="sidebar-new-chat-btn">
                    <i class="fa-solid fa-plus"></i> New Chat
                </button>
            </div>
            <nav id="session-list" class="session-list"></nav>
        </aside>

        <div id="chat-main-content">
            <div class="chat-layout">
                <header class="chat-header">
                    <div class="header-left">
                        <button id="menu-toggle-btn" class="header-button" title="Menu">
                            <i class="fa-solid fa-bars"></i>
                        </button>
                        <img src="../image/logo2.png" alt="Icon" class="header-logo"> 
                        <h2 id="chat-title">Synapse Veda</h2>
                    </div>

                    <div class="header-right">
                        <select id="ai-selector" style="padding:8px 12px;border-radius:8px;border:none;outline:none;background:#222;color:white;margin-right:15px;">
                            <option value="synapse">Synapse Default</option>
                            <option value="chatgpt">ChatGPT</option>
                            <option value="cici">Cici AI</option>
                            <option value="gemini">Gemini</option>
                        </select>

                        <div class="theme-switcher">
                            <i class="fa-solid fa-sun"></i>
                            <label class="switch">
                                <input type="checkbox" id="theme-toggle">
                                <span class="slider round"></span>
                            </label>
                            <i class="fa-solid fa-moon"></i>
                        </div>
                    </div>
                </header>

                <main id="chat-container" class="chat-container">
                    <div id="chat-messages" class="chat-messages"></div>
                </main>

                <footer class="chat-input-area-wrapper">
                    <div id="preview-area" class="image-preview-container">
                        <div class="preview-wrapper">
                            <img id="image-preview" src="" alt="Preview">
                            <button id="remove-preview"><i class="fa-solid fa-xmark"></i></button>
                        </div>
                    </div>

                    <div class="chat-input-area">
                        <input type="file" id="file-input" accept="image/*">
                        <button type="button" class="upload-btn" id="attach-button" title="Upload Gambar">
                            <i class="fa-solid fa-paperclip"></i>
                        </button>

                        <textarea id="message-input" placeholder="Ketik pesan atau caption upscale..." rows="1"></textarea>
                        <button id="send-button" title="Kirim Pesan">
                            <i class="fa-solid fa-paper-plane"></i>
                        </button>
                    </div>
                    <p class="api-disclaimer">Synapse adalah AI dan dapat melakukan kesalahan.</p>
                </footer>
            </div>
        </div>
    </div>

    <div id="sidebar-overlay"></div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js" defer></script>
    <script src="../js/script.js"></script>

    <script>
        const fileInput = document.getElementById('file-input');
        const attachBtn = document.getElementById('attach-button');
        const previewArea = document.getElementById('preview-area');
        const imagePreview = document.getElementById('image-preview');
        const removePreview = document.getElementById('remove-preview');
        const sendBtn = document.getElementById('send-button');
        const messageInput = document.getElementById('message-input');

        attachBtn.onclick = () => fileInput.click();

        fileInput.onchange = () => {
            const file = fileInput.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    imagePreview.src = e.target.result;
                    previewArea.style.display = 'block';
                }
                reader.readAsDataURL(file);
            }
        };

        function clearPreview() {
            fileInput.value = "";
            previewArea.style.display = 'none';
            imagePreview.src = "";
        }

        removePreview.onclick = clearPreview;

        // Pemicu handleSendMessage yang ada di script.js
        sendBtn.addEventListener('click', () => {
            if (typeof handleSendMessage === "function") {
                handleSendMessage();
            }
        });
    </script>
</body>
</html>
